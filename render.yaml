services:
  # Web UI Service
  - type: web
    name: schoolmind-ui
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python ui_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: PORT
        value: 10000
    
  # Search Server Service
  - type: web
    name: schoolmind-search
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python search-server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: PORT
        value: 10001
